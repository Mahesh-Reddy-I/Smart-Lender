<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Loan Application | Smart Lender</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar">

        <div class="container nav-container">

            <a href="/" class="logo">
                <i class="fa-solid fa-building-columns"></i>
                Smart Lender
            </a>

            <ul class="nav-links">

                <li><a href="/">Home</a></li>

                <li><a href="{{ url_for('predict') }}" class="active">
                        Apply Loan
                    </a>
                </li>

            </ul>

            <div class="menu-toggle">
                <i class="fa-solid fa-bars"></i>
            </div>

        </div>

    </nav>

    <!-- ================= PAGE HEADER ================= -->

    <section class="page-header">

        <div class="container">

            <h1>Loan Application Form</h1>

            <p>

                Complete the following information to receive
                an AI-powered loan eligibility prediction.

            </p>

        </div>

    </section>

    <!-- ================= FORM ================= -->

    <section class="form-section">

        <div class="container">

            <form
                class="loan-form"
                action="{{ url_for('submit') }}"
                method="POST"
                id="loanForm">

                <!-- Personal Information -->

                <div class="form-card">

                    <h2>

                        <i class="fa-solid fa-user"></i>

                        Personal Information

                    </h2>

                    <div class="form-grid">

                        <div class="input-group">

                            <label>Applicant Name</label>

                            <input
                                type="text"
                                name="name"
                                placeholder="Enter your name"
                                required>

                        </div>

                        <div class="input-group">

                            <label>Gender</label>

                            <select name="gender" required>

                                <option value="">Select</option>

                                <option value="Male">Male</option>

                                <option value="Female">Female</option>

                            </select>

                        </div>

                        <div class="input-group">

                            <label>Married</label>

                            <select name="married" required>

                                <option value="">Select</option>

                                <option value="Yes">Yes</option>

                                <option value="No">No</option>

                            </select>

                        </div>

                        <div class="input-group">

                            <label>Dependents</label>

                            <select name="dependents">

                                <option value="0">0</option>

                                <option value="1">1</option>

                                <option value="2">2</option>

                                <option value="3+">3+</option>

                            </select>

                        </div>

                    </div>

                </div>

                <!-- Education -->

                <div class="form-card">

                    <h2>

                        <i class="fa-solid fa-graduation-cap"></i>

                        Education & Employment

                    </h2>

                    <div class="form-grid">

                        <div class="input-group">

                            <label>Education</label>

                            <select name="education">

                                <option value="Graduate">Graduate</option>

                                <option value="Not Graduate">
                                    Not Graduate
                                </option>

                            </select>

                        </div>

                        <div class="input-group">

                            <label>Self Employed</label>

                            <select name="self_employed">

                                <option value="No">No</option>

                                <option value="Yes">Yes</option>

                            </select>

                        </div>

                    </div>

                </div>

                <!-- Financial -->

                <div class="form-card">

                    <h2>

                        <i class="fa-solid fa-wallet"></i>

                        Financial Details

                    </h2>

                    <div class="form-grid">

                        <div class="input-group">

                            <label>Applicant Income</label>

                            <input
                                type="number"
                                name="applicant_income"
                                placeholder="Monthly Income"
                                required>

                        </div>

                        <div class="input-group">

                            <label>Co-applicant Income</label>

                            <input
                                type="number"
                                name="coapplicant_income"
                                placeholder="Monthly Income"
                                value="0">

                        </div>

                        <div class="input-group">

                            <label>Loan Amount</label>

                            <input
                                type="number"
                                name="loan_amount"
                                placeholder="Loan Amount"
                                required>

                        </div>

                        <div class="input-group">

                            <label>Loan Term (Days)</label>

                            <input
                                type="number"
                                name="loan_term"
                                placeholder="Loan Duration"
                                required>

                        </div>

                        <div class="input-group">

                            <label>Credit History</label>

                            <select name="credit_history">

                                <option value="1">
                                    Good
                                </option>

                                <option value="0">
                                    Bad
                                </option>

                            </select>

                        </div>

                        <div class="input-group">

                            <label>Property Area</label>

                            <select name="property_area">

                                <option value="Urban">
                                    Urban
                                </option>

                                <option value="Semiurban">
                                    Semiurban
                                </option>

                                <option value="Rural">
                                    Rural
                                </option>

                            </select>

                        </div>

                    </div>

                </div>

                <!-- Submit -->

                <div class="submit-box">

                    <button
                        type="submit"
                        class="btn btn-primary btn-large">

                        <i class="fa-solid fa-magnifying-glass-chart"></i>

                        Predict Loan Approval

                    </button>

                </div>

            </form>

        </div>

    </section>

    <!-- ================= FOOTER ================= -->

    <footer>

        <div class="container">

            <p>

                © 2026 Smart Lender |
                AI Based Loan Prediction System

            </p>

        </div>

    </footer>

    <!-- JS -->

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>next
